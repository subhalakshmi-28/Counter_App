<!DOCTYPE html>
<html>
<head>
    <title>Counter App</title>
<style>
    body{
        font-family: Arial;
        background: #f5f5f5;
        text-align: center;
        margin-top: 100px;
    }
    .container{
        width: 300px;
        margin: auto;
        padding: 20px;
        background: white;
        border: 1px solid #ccc;
        border-radius: 8px;
    }
    #count{
        font-size: 50px;
        margin: 20px 0;
    }
    button{
        padding: 10px 20px;
        margin: 5px;
        font-size: 18px;
        cursor: pointer;
}
    </style>
</head>
<body>
<div class="container">
    <h2>Counter App</h2>
    <h1 id="count">0</h1>
    <button onclick="increase()">+1</button>
    <button onclick="decrease()">-1</button>
    <button onclick="reset()">Reset</button>
</div>
<script>
let count = 0;
function increase()
{
    count = count + 1;
    document.getElementById("count").innerHTML = count;
}
function decrease()
{
    count = count - 1;
    document.getElementById("count").innerHTML = count;
}
function reset()
{
    count = 0;
    document.getElementById("count").innerHTML = count;
}
</script>
</body>
</html>
